version: '3'
services:
  pwnboard:
    build: .
    environment:
      - FLASK_DEBUG=true
      - FLASK_PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PWNBOARD_URL=https://pwnboard.win
      - CACHE_TIME=-1    # Seconds to cache for. set to -1 to disable
      - HOST_TIMEOUT=5
      - CREDS_TIMEOUT=30
      - DEFAULT_USER=admin
      - DEFAULT_USER_PASSWORD=password
    volumes:
      - ./board.json:/opt/pwnboard/board.json:ro

  redis:
    image: redis:alpine
    restart: always

  reverse-proxy:
    build: ./reverse-proxy
    restart: always
    ports:
      - "443:443"
