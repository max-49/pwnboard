services:
  pwnboard:
    image: ghcr.io/max-49/pwnboard:latest
    restart: unless-stopped
    environment:
      - FLASK_DEBUG=false
      - FLASK_PORT=5000
      - POSTGRES_PASSWORD=${PWNBOARD_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - PWNBOARD_URL=https://${PWNBOARD_DOMAIN}
      - CACHE_TIME=-1    # Seconds to cache data for. set to -1 to disable
      - REFRESH_SECONDS=10 # Seconds after which to refresh the page
      - HOST_TIMEOUT=5
      - CREDS_TIMEOUT=30
      - DEFAULT_USER=admin
      - DEFAULT_USER_PASSWORD=${PWNBOARD_PASSWORD}
      - LOGIN_PAGE_MESSAGE=Contact an admin to get an account!
      - USE_ACCESS_TOKENS=true
    volumes:
      - ./board.json:/opt/pwnboard/board.json:ro
    depends_on:
      - db

  redis:
    image: redis:alpine
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: pwnboard_db
      POSTGRES_USER: pwnboard_user
      POSTGRES_PASSWORD: ${PWNBOARD_PASSWORD}
    volumes:
      - pwnboard-data:/var/lib/postgresql/data

  worker:
    image: ghcr.io/max-49/pwnboard:latest
    command: /opt/venv/bin/python worker.py
    restart: unless-stopped
    volumes:
      - ./board.json:/opt/pwnboard/board.json:ro
    depends_on:
      - db
      - redis

  data:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${PWNBOARD_PASSWORD}
      - GF_PLUGINS_PREINSTALL=magnesium-wordcloud-panel
      - GF_SECURITY_ALLOW_EMBEDDING=true 
    volumes:
      - ./conf/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./conf/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./conf/grafana/provisioning/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - db

  reverse-proxy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./conf/reverse-proxy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - PWNBOARD_DOMAIN=${PWNBOARD_DOMAIN}

volumes:
  pwnboard-data:
